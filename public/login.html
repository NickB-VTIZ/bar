<!DOCTYPE html>
<html lang="nl">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon-180.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zomerbar · Inloggen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme: light;
  --sun:#FFB700;--sun-d:#E09600;--sun-l:#FCEBC8;--sun-t:#391C14;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#0F6E56;
  --coral:#D8642F;--coral-l:#FBEADF;--coral-d:#A8431B;
  --bg:#FDF1DB;--card:#FFFBF2;--bd:#EADBBE;
  --tx:#391C14;--mu:#8A7256;--mu2:#B3A082;
  --r:14px;--rm:9px;
}


body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--tx);}
.login-box{background:var(--card);border:0.5px solid var(--bd);border-radius:var(--r);padding:32px 28px;width:100%;max-width:360px;text-align:center;}
.login-icon{font-size:48px;margin-bottom:12px;}
.login-title{font-size:20px;font-weight:600;margin-bottom:4px;}
.login-sub{font-size:14px;color:var(--mu);margin-bottom:24px;}
.login-input{width:100%;font-size:15px;padding:13px 14px;border:0.5px solid var(--bd);border-radius:var(--rm);background:var(--bg);color:var(--tx);text-align:center;margin-bottom:12px;}
.login-input:focus{outline:none;border-color:var(--sun);}
.login-btn{width:100%;padding:14px;font-size:15px;font-weight:600;background:var(--sun);color:var(--sun-t);border:none;border-radius:var(--rm);cursor:pointer;}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-error{background:var(--coral-l);color:var(--coral-d);border-radius:var(--rm);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}
.login-error.show{display:block;}
.login-hint{font-size:12px;color:var(--mu);margin-top:16px;line-height:1.5;}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-icon">🔒</div>
  <div class="login-title">Beheerderstoegang</div>
  <div class="login-sub">Zomerbar admin & boekhouding</div>
  <div class="login-error" id="error"></div>
  <input class="login-input" id="password" type="password" placeholder="Wachtwoord" autofocus>
  <button class="login-btn" id="login-btn" onclick="doLogin()">Inloggen</button>
  <div class="login-hint">Enkel voor de barhouder. Klanten hebben dit niet nodig om te bestellen.</div>
</div>

<script src="/api.js"></script>
<script>
const params = new URLSearchParams(location.search);
const next = params.get('next') || '/bar';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pw = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error');
  err.classList.remove('show');
  if (!pw) return;
  btn.disabled = true; btn.textContent = 'Inloggen…';
  try {
    const r = await API.auth.login(pw);
    API.setToken(r.token);
    window.location.href = next;
  } catch(e) {
    err.textContent = e.message === 'Verkeerd wachtwoord' ? '❌ Verkeerd wachtwoord' : '❌ ' + e.message;
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Inloggen';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}

// If already logged in, redirect
(async () => {
  if (API.getToken()) {
    try { const c = await API.auth.check(); if (c.valid) window.location.href = next; } catch(_) {}
  }
})();
</script>
</body>
</html>
