services:
  zomerbar:
    image: ghcr.io/nickb-vtiz/bar:latest
    container_name: zomerbar-pos
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - zomerbar_data:/data
    environment:
      - PORT=3000
      - DB_PATH=/data/zomerbar.db
      - NODE_ENV=production
      - ADMIN_PASSWORD=zomerbar2025
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  zomerbar_data:
    driver: local

