services:
  zomerbar:
    build: .
    container_name: zomerbar-pos
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - zomerbar_data:/data
    environment:
      - PORT=3000
      - DB_PATH=/data/zomerbar.db
      - NODE_ENV=production
      - ADMIN_PASSWORD=zomerbar2025
      - TZ=Europe/Brussels
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zomerbar.rule=Host(`bar.boerderbij.be`) || Host(`nbotech.cloud`)"
      - "traefik.http.routers.zomerbar.entrypoints=websecure"
      - "traefik.http.routers.zomerbar.tls.certresolver=letsencrypt"
      - "traefik.http.services.zomerbar.loadbalancer.server.port=3000"

volumes:
  zomerbar_data:
    driver: local
